version: "3"

services:
  prometheus:
    image: prom/prometheus:v2.37.6
    container_name: sage-v-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - sage-v-network

  grafana:
    image: grafana/grafana:9.4.3
    container_name: sage-v-grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=$GRAFANA_ADMIN_USER
      - GF_SECURITY_ADMIN_PASSWORD=$GRAFANA_ADMIN_PASSWORD
      - GF_SERVER_ROOT_URL=$NEXT_PUBLIC_GRAFANA_URL
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_FEATURE_TOGGLES_ENABLE=publicDashboards
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_NAME=SageV
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_SECURITY_COOKIE_SECURE=$GRAFANA_SECURE_COOKIE
    restart: unless-stopped
    ports:
      - "4000:3000"
    env_file:
      - .env
    networks:
      - sage-v-network

  prom-aggregation-gateway:
    container_name: sage-v-prom-agg-gateway
    image: ghcr.io/zapier/prom-aggregation-gateway:v0.7.0
    volumes: 
      - prometheus_data:/prom-agg-gateway
    ports:
      - "8081:80"
    env_file:
      - .env
    environment:
      - PAG_AUTHUSERS=$PAG_AUTHUSERS
    networks:
      - sage-v-network

volumes:
  grafana_data: {}
  prometheus_data: {}

networks:
  sage-v-network:
    name: sage-v-network